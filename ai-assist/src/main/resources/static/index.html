<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ai-assist — listen &amp; draft</title>
<style>
  :root { --accent: #4f46e5; --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --muted: #64748b; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); }
  header { padding: 1.25rem 2rem; background: var(--card); border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: .75rem; }
  header h1 { font-size: 1.15rem; margin: 0; }
  header span { color: var(--muted); font-size: .85rem; }
  main { max-width: 1100px; margin: 1.5rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
  @media (max-width: 800px) { main { grid-template-columns: 1fr; } }
  .card { background: var(--card); border: 1px solid #e2e8f0; border-radius: 12px; padding: 1.25rem; }
  .card h2 { margin: 0 0 .75rem; font-size: 1rem; }
  label { display: block; font-size: .8rem; color: var(--muted); margin: .6rem 0 .2rem; }
  input, textarea, select { width: 100%; padding: .55rem .7rem; border: 1px solid #cbd5e1; border-radius: 8px; font: inherit; }
  textarea { min-height: 110px; resize: vertical; }
  button { font: inherit; border: 0; border-radius: 8px; padding: .55rem 1rem; cursor: pointer; }
  .primary { background: var(--accent); color: #fff; }
  .secondary { background: #e2e8f0; color: var(--text); }
  .listening { background: #dc2626 !important; color: #fff; animation: pulse 1.2s infinite; }
  @keyframes pulse { 50% { opacity: .6; } }
  .row { display: flex; gap: .6rem; margin-top: .8rem; flex-wrap: wrap; }
  #utterances { list-style: none; padding: 0; margin: .8rem 0 0; max-height: 220px; overflow-y: auto; font-size: .9rem; }
  #utterances li { padding: .35rem .5rem; border-bottom: 1px solid #f1f5f9; }
  #utterances li em { color: var(--muted); font-style: normal; font-size: .75rem; margin-right: .4rem; }
  #status { font-size: .8rem; color: var(--muted); margin-top: .5rem; min-height: 1.1em; }
  #draftOutput { white-space: pre-wrap; font-size: .9rem; line-height: 1.55; max-height: 480px; overflow-y: auto; }
  #draftOutput h1 { font-size: 1.2rem; } #draftOutput h2 { font-size: 1rem; }
  .badge { display: inline-block; background: #eef2ff; color: var(--accent); border-radius: 999px; padding: .1rem .6rem; font-size: .72rem; margin-left: .4rem; }
</style>
</head>
<body>
<header>
  <h1>🎙️ ai-assist</h1>
  <span>listen &amp; draft detailed content — fully offline, nothing leaves this machine</span>
</header>
<main>
  <section class="card">
    <h2>1 · Listen</h2>
    <label for="topic">Topic</label>
    <input id="topic" placeholder="e.g. Weekly project status update">
    <div class="row">
      <button id="startSession" class="primary">Start session</button>
    </div>
    <label for="typedText">Type a note and press Enter (speech is transcribed locally below)</label>
    <input id="typedText" placeholder="Type what the assistant should hear" disabled>

    <h2 style="margin-top:1.2rem">Live capture <span class="badge">Webex / Teams / mic — 100% local</span></h2>
    <label for="deviceSelect">Capture device (loopback = meeting audio, mic = your voice)</label>
    <select id="deviceSelect"><option value="">System default input</option></select>
    <div class="row">
      <button id="liveBtn" class="secondary" disabled>📡 Start meeting capture</button>
    </div>

    <ul id="utterances"></ul>
    <div id="status"></div>
  </section>

  <section class="card">
    <h2>2 · Draft</h2>
    <label for="contentType">Content type</label>
    <select id="contentType">
      <option value="DOCUMENT">Document</option>
      <option value="EMAIL">Email</option>
      <option value="MEETING_NOTES">Meeting notes</option>
      <option value="BLOG_POST">Blog post</option>
      <option value="SUMMARY">Summary</option>
    </select>
    <label for="tone">Tone</label>
    <select id="tone">
      <option value="PROFESSIONAL">Professional</option>
      <option value="FRIENDLY">Friendly</option>
      <option value="CONCISE">Concise</option>
      <option value="PERSUASIVE">Persuasive</option>
    </select>
    <div class="row">
      <button id="draftBtn" class="primary" disabled>Draft content</button>
      <button id="copyBtn" class="secondary" hidden>Copy draft</button>
      <span id="engineBadge" class="badge" hidden></span>
    </div>
    <div id="draftOutput"></div>
  </section>
</main>
<script>
  let sessionId = null;
  let lastDraftText = '';

  const $ = id => document.getElementById(id);
  const status = msg => { $('status').textContent = msg; };

  let liveActive = false;
  let livePollTimer = null;
  let renderedCount = 0;

  async function loadDevices() {
    try {
      const res = await fetch('/api/audio/devices');
      const devices = await res.json();
      for (const d of devices) {
        const opt = document.createElement('option');
        opt.value = d.name;
        opt.textContent = (d.likelyLoopback ? '🔁 ' : '🎤 ') + d.name;
        $('deviceSelect').appendChild(opt);
      }
      const loopback = devices.find(d => d.likelyLoopback);
      if (loopback) $('deviceSelect').value = loopback.name;
    } catch (e) { /* device list is best-effort */ }
  }
  loadDevices();

  // The app auto-starts meeting capture on launch — adopt that session so the
  // page shows live transcript and auto-drafted notes with zero clicks.
  (async function adoptAutoSession() {
    try {
      const st = await (await fetch('/api/live/status')).json();
      if (st.sessionId && (st.state === 'LISTENING' || st.state === 'PREPARING')) {
        sessionId = st.sessionId;
        $('draftBtn').disabled = false;
        $('typedText').disabled = false;
        setLive(true);
        status(st.state === 'PREPARING' ? 'Preparing speech model…' : 'Listening to meeting audio…');
        livePollTimer = setInterval(pollLive, 2000);
      }
    } catch (e) { /* not running yet */ }
  })();

  $('liveBtn').onclick = async () => {
    if (liveActive) {
      await fetch('/api/live/stop', { method: 'POST' });
      setLive(false);
      status('Meeting capture stopped.');
      return;
    }
    const res = await fetch('/api/live/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ device: $('deviceSelect').value, sessionId })
    });
    const st = await res.json();
    if (!res.ok) { status(st.detail || 'Could not start meeting capture.'); return; }
    sessionId = st.sessionId;
    $('draftBtn').disabled = false;
    setLive(true);
    status('Capturing audio — transcription runs locally on this machine, nothing leaves it.');
    livePollTimer = setInterval(pollLive, 2000);
  };

  function setLive(active) {
    liveActive = active;
    $('liveBtn').textContent = active ? '⏹ Stop meeting capture' : '📡 Start meeting capture';
    $('liveBtn').classList.toggle('listening', active);
    if (!active && livePollTimer) { clearInterval(livePollTimer); livePollTimer = null; }
  }

  async function pollLive() {
    const st = await (await fetch('/api/live/status')).json();
    if (st.state === 'ERROR') { setLive(false); status('Capture error: ' + st.detail); return; }
    if (st.state === 'PREPARING') status(st.detail + '…');
    if (st.state === 'LISTENING') status('Listening to meeting audio…');
    const session = await (await fetch(`/api/sessions/${sessionId}`)).json();
    for (const u of session.utterances.slice(renderedCount)) {
      const li = document.createElement('li');
      li.innerHTML = `<em>#${u.sequence} · ${u.speaker}</em>${u.text}`;
      $('utterances').appendChild(li);
      li.scrollIntoView();
    }
    renderedCount = session.utterances.length;

    // Show the latest auto-generated draft without any clicks.
    const draftRes = await fetch('/api/live/draft');
    if (draftRes.status === 200) {
      const draft = await draftRes.json();
      if (draft.fullText !== lastDraftText) {
        lastDraftText = draft.fullText;
        $('draftOutput').innerHTML = renderMarkdown(draft.fullText);
        $('engineBadge').textContent = 'engine: ' + draft.generatedBy + ' (auto)';
        $('engineBadge').hidden = false;
        $('copyBtn').hidden = false;
      }
    }
  }

  $('startSession').onclick = async () => {
    const res = await fetch('/api/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic: $('topic').value })
    });
    const session = await res.json();
    sessionId = session.id;
    $('utterances').innerHTML = '';
    renderedCount = 0;
    $('typedText').disabled = false;
    $('draftBtn').disabled = false;
    status('Session started — speak or type your notes.');
  };

  async function sendUtterance(text) {
    if (!sessionId || !text.trim()) return;
    const res = await fetch(`/api/sessions/${sessionId}/utterances`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    const u = await res.json();
    const li = document.createElement('li');
    li.innerHTML = `<em>#${u.sequence}</em>${u.text}`;
    $('utterances').appendChild(li);
    li.scrollIntoView();
  }

  $('typedText').addEventListener('keydown', e => {
    if (e.key === 'Enter') { sendUtterance(e.target.value); e.target.value = ''; }
  });

  $('draftBtn').onclick = async () => {
    status('Drafting…');
    const res = await fetch(`/api/sessions/${sessionId}/draft`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contentType: $('contentType').value, tone: $('tone').value })
    });
    if (!res.ok) { const err = await res.json().catch(() => ({})); status(err.detail || 'Drafting failed — capture some notes first.'); return; }
    const draft = await res.json();
    lastDraftText = draft.fullText;
    $('draftOutput').innerHTML = renderMarkdown(draft.fullText);
    $('engineBadge').textContent = 'engine: ' + draft.generatedBy;
    $('engineBadge').hidden = false;
    $('copyBtn').hidden = false;
    status(draft.savedTo ? 'Draft ready — saved to ' + draft.savedTo : 'Draft ready.');
  };

  $('copyBtn').onclick = () => navigator.clipboard.writeText(lastDraftText).then(() => status('Copied to clipboard.'));

  function renderMarkdown(md) {
    const esc = md.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    return esc.split('\n').map(line => {
      if (line.startsWith('## ')) return '<h2>' + line.slice(3) + '</h2>';
      if (line.startsWith('# ')) return '<h1>' + line.slice(2) + '</h1>';
      if (line.startsWith('- ')) return '<div>• ' + line.slice(2) + '</div>';
      return line ? '<div>' + line + '</div>' : '<br>';
    }).join('');
  }
</script>
</body>
</html>
