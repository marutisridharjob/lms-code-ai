spring:
  application:
    name: ai-assist

server:
  port: 8080

ai-assist:
  output:
    # When Stop is pressed, the complete notes are saved as a timestamped
    # rich-text (.rtf) file. Leave dir blank to save into a "meeting-notes"
    # folder inside the app's own folder (next to the jar); set an absolute
    # path to save somewhere else (e.g. ${user.home}/Desktop).
    save-drafts: true
    dir: ""
  auto:
    # Listening begins when the user presses Start (set true to begin
    # capturing immediately at launch). Interim notes keep re-drafting in
    # memory. The desktop window opens automatically.
    start-capture: false
    draft-interval-seconds: 30
    content-type: MEETING_NOTES
    tone: PROFESSIONAL
  transcription:
    # English speech model (proven, lightweight vosk-small-en-us). It ships
    # in src/main/resources/vosk-model.zip, so every jar built with plain
    # `mvn package` embeds it; at runtime it is unpacked invisibly to OS
    # temp space — the user only ever handles the single jar file.
    model-dir: ${java.io.tmpdir}/ai-assist/models
    model-name: vosk-model-small-en-us-0.15
    # Keep false so the app never uses the internet at runtime.
    allow-download: false
    sample-rate: 16000
    # Optional override for the meeting-audio source. Leave empty to
    # auto-detect: microphone + any OS loopback device (e.g. "Stereo Mix").
    preferred-device: ""
  ollama:
    # Set to true to draft with a local open-source LLM served by Ollama
    # (https://ollama.com). When false, the built-in template drafter is used.
    enabled: false
    base-url: http://localhost:11434
    model: llama3.2
    timeout-seconds: 120

management:
  endpoints:
    web:
      exposure:
        include: health,info
